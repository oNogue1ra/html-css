<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídia em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagem flexivel">
    </picture>

    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reprozir áudios em HTML5.</p>
    <audio src="midia/A Walk Into Space - Topher Mohr and Alex Elena.mp3" controls autoplay></audio>
    <!--MP3 / WAV / OGG = arquivos compativeis-->
    <audio preload="metadata" autoplay crontrols loop>
        <source src="midia/Cielo - Huma-Huma.mp3" type="audio/mpeg"> <!--se um nao reproduzir o site tenta o proximo audio, seguindo a ordem que você fez-->
        <source src="midia/Cielo - Huma-Huma.ogg" type="audio/ogg">
        <source src="midia/Cielo - Huma-Huma.wav" type="audio/wav"> <!--evitar esse tipo de arquivo (muito pesado, pode prejudicar o site)-->
        <p>Infelizmente seu navegador não consegue reproduzird áudio. <a href="midia/Cielo - Huma-Huma.mp3"> Clique aqui para baixar o arquivo MP3</a></p>
    </audio>
    

</body>
</html>
