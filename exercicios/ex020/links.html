<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /*  SELETORES PERSONALIZADOS NO CSS
            # = id
            . = class
            : = pseudo-class
            :: = pseudo-elemento
            > = clildren (filho)
        */

        body {
            font-family: Arial, Helvetica, sans-serif;
            text-decoration: none;
            font-weight: bold;
        }

        a {
            color: red;
        }

        a:visited {
            color: darkred;
        }

        a:hover {
            color: black;
            text-decoration: underline;
        }

        a:active {
            color: yellow
        }

        .especial::before {
            content: '→';
            color: darkgray;
        }

        .especial::after {
            content: '←';
            text-decoration: none;
            color: darkgray;
        }

    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://github.com/gustavoguanabara/html-css">Repositório GitHub</a></li>
        <li><a href="https://github.com/gustavoguanabara/html-css" class="especial">Canal do YouTube</a></li>
        <li><a href="https://github.com/gustavoguanabara/html-css">Síte do CursoemVideo</a></li>
    </ul>
</body>
</html>
