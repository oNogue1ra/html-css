<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: 'maquina';
            src: url('fonts/JMH\ Typewriter-Thin.ttf') ;
        }
        @font-face {
            font-family: 'larry' ;
            src: url('fonts/Sailor\ Larry\ -\ Regular.ttf') ;
        }

            /*
                Tipos de formato
                - opentype (otf)
                - truetype (ttf)
                - embedded-opentype
                -truetype-aat (Apple Advanced Typography)
                - svg
            */

        body {
            font-family: 'maquina', Helvetica, sans-serif;
        }

        h1 {
            font-family: 'larry', Helvetica, sans-serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Autem maiores magnam quas fugit quos, dolorem quisquam voluptates et. Quo, beatae saepe? Optio ullam consequatur saepe obcaecati perspiciatis omnis odit accusamus?</p>
</body>
</html>
